esphome:
  name: temp
  friendly_name: temp

esp32:
  board: esp32dev
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key_temp

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Temp Fallback Hotspot"
    password: !secret fallback_passoword

captive_portal:

# sensor:
#   - platform: dht
#     pin: GPIO22
#     temperature:
#       name: "DHT11 Temperature"
#     humidity:
#       name: "DHT11 Humidity"
#     update_interval: 5s

i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true

sensor:
  # =========================
  # SHT30
  # =========================
  - platform: sht4x
    address: 0x44
    temperature:
      name: "Temperatura"
      id: temp_quarto
      accuracy_decimals: 2
      filters:
        - sliding_window_moving_average:
            window_size: 15
            send_every: 1
    humidity:
      name: "Umidade"
      id: umidade_quarto
      accuracy_decimals: 2
      filters:
        - sliding_window_moving_average:
            window_size: 15
            send_every: 1
    update_interval: 3s

  # =========================
  # Dew Point
  # =========================
  - platform: template
    name: "Dew Point"
    id: dew_point
    unit_of_measurement: "°C"
    accuracy_decimals: 2
    update_interval: 5s
    lambda: |-
      if (isnan(id(temp_quarto).state) || isnan(id(umidade_quarto).state)) {
        return NAN;
      }

      const float a = 17.27;
      const float b = 237.7;

      float t = id(temp_quarto).state;
      float rh = id(umidade_quarto).state;

      float alpha = log(rh / 100.0) + (a * t) / (b + t);
      return (b * alpha) / (a - alpha);

text_sensor:
  # =========================
  # Conforto
  # =========================
  - platform: template
    name: "Conforto do Ambiente"
    update_interval: 5s
    lambda: |-
      float dp = id(dew_point).state;
      if (isnan(dp)) return {"Indisponível"};

      if (dp < 10.0) return {"Muito seco"};
      if (dp < 15.5) return {"Confortável"};
      if (dp < 18.3) return {"Começando a grudar"};
      if (dp < 21.1) return {"Desagradável"};
      return {"Muito abafado"};

  # =========================
  # Recomendação do Ar
  # =========================
  - platform: template
    name: "Modo Recomendado do Ar"
    update_interval: 5s
    lambda: |-
      float dp = id(dew_point).state;
      float t = id(temp_quarto).state;

      if (isnan(dp) || isnan(t)) return {"Indisponível"};

      if (dp > 16.0) {
        if (t > 26.0) return {"COOL"};
        return {"DRY"};
      }

      if (t > 27.0) return {"COOL"};

      return {"OFF"};

switch:
  - platform: gpio
    name: "Aquecedor a Óleo"
    pin: GPIO23
    icon: mdi:radiator



