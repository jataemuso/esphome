esphome:
  name: portao
  friendly_name: "Portão Garagem"

# Se for ESP8266
esp8266:
  board: nodemcuv2

# --- Rede ---
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # opcional: ip fixo
  manual_ip:
    static_ip: 192.168.1.50
    gateway: 192.168.1.1
    subnet: 255.255.255.0

# --- API (ESPHome <-> Home Assistant) com encriptação ---
api:
  encryption:
    key: !secret api_encryption_key_portao

# --- OTA (agora precisa do platform:) ---
ota:
  - platform: esphome
    password: !secret ota_password

logger:

# --- Relé (acionamento do portão) ---
switch:
  - platform: gpio
    pin: D1
    id: relay
    internal: true
    restore_mode: ALWAYS_OFF

# --- Sensor de posição (reed switch / fim de curso) ---
binary_sensor:
  - platform: gpio
    pin: D2
    id: portao_sensor
    name: "Portão - Sensor"
    device_class: garage_door
    filters:
      - delayed_on: 20ms
      - delayed_off: 20ms

# --- Cover (porta/portão) ---
cover:
  - platform: template
    name: "Portão Garagem"
    device_class: garage
    open_action:
      - switch.turn_on: relay
      - delay: 500ms
      - switch.turn_off: relay
    close_action:
      - switch.turn_on: relay
      - delay: 500ms
      - switch.turn_off: relay
    stop_action:
      - switch.turn_on: relay
      - delay: 500ms
      - switch.turn_off: relay
    optimistic: false
    lambda: |-
      if (id(portao_sensor).state) {
        return COVER_OPEN;
      } else {
        return COVER_CLOSED;
      }
