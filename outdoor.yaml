esphome:
  name: outdoor
  friendly_name: Outdoor SHT41

esp8266:
  board: nodemcuv2

# =========================
# Logs
# =========================
logger:

# =========================
# API com criptografia
# =========================
api:
  encryption:
    key: !secret api_encryption_key_outdoor

# =========================
# OTA (recomendado manter)
# =========================
ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "Outdoor SHT41 Fallback"
    password: !secret fallback_passoword

captive_portal:

# =========================
# I2C – NodeMCU
# =========================
# D2 = GPIO4 (SDA)
# D1 = GPIO5 (SCL)
i2c:
  sda: D2
  scl: D1
  scan: true

# =========================
# SHT41
# =========================
sensor:
  - platform: sht4x
    temperature:
      name: "Temperatura Externa"
      id: temp_outdoor
      unit_of_measurement: "°C"
      accuracy_decimals: 2
      filters:
        - sliding_window_moving_average:
            window_size: 100
            send_every: 15
    humidity:
      name: "Umidade Externa"
      id: umidade_outdoor
      unit_of_measurement: "%"
      accuracy_decimals: 2
      filters:
        - sliding_window_moving_average:
            window_size: 100
            send_every: 15
    update_interval: 3s

  # =========================
  # Dew Point
  # =========================
  - platform: template
    name: "Ponto de Orvalho Externo"
    id: dew_point_outdoor
    unit_of_measurement: "°C"
    accuracy_decimals: 2
    update_interval: 10s
    lambda: |-
      if (isnan(id(temp_outdoor).state) || isnan(id(umidade_outdoor).state)) {
        return NAN;
      }

      const float a = 17.27;
      const float b = 237.7;

      float t = id(temp_outdoor).state;
      float rh = id(umidade_outdoor).state;

      float alpha = log(rh / 100.0) + (a * t) / (b + t);
      return (b * alpha) / (a - alpha);

# =========================
# Conforto Outdoor
# =========================
text_sensor:
  - platform: template
    name: "Conforto Climático Externo"
    update_interval: 10s
    lambda: |-
      float dp = id(dew_point_outdoor).state;
      float t = id(temp_outdoor).state;

      if (isnan(dp) || isnan(t)) return {"Indisponível"};

      if (dp < 7.0)  return {"Ar muito seco"};
      if (dp < 13.0) return {"Agradável"};
      if (dp < 16.0) return {"Levemente úmido"};
      if (dp < 19.0) return {"Úmido"};
      if (dp < 22.0) return {"Muito úmido"};
      return {"Abafado / sensação pesada"};
